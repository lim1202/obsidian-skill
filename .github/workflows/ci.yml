name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin manifest
        run: |
          echo "=== Validating plugin/manifest.json ==="
          printf '%s\n' 'import json, sys, os' > /tmp/validate_manifest.py
          printf '%s\n' "with open('plugin/manifest.json') as f:" >> /tmp/validate_manifest.py
          printf '%s\n' '    m = json.load(f)' >> /tmp/validate_manifest.py
          printf '%s\n' "required = ['name', 'version', 'description', 'skills']" >> /tmp/validate_manifest.py
          printf '%s\n' 'for k in required:' >> /tmp/validate_manifest.py
          printf '%s\n' '    if k not in m:' >> /tmp/validate_manifest.py
          printf '%s\n' '        print(f"Missing: {k}")' >> /tmp/validate_manifest.py
          printf '%s\n' '        sys.exit(1)' >> /tmp/validate_manifest.py
          printf '%s\n' 'print(f\'name: {m["name"]}\')' >> /tmp/validate_manifest.py
          printf '%s\n' 'print(f\'version: {m["version"]}\')' >> /tmp/validate_manifest.py
          printf '%s\n' "for s in m['skills']:" >> /tmp/validate_manifest.py
          printf '%s\n' '    p = s["path"]' >> /tmp/validate_manifest.py
          printf '%s\n' '    if not os.path.exists(p):' >> /tmp/validate_manifest.py
          printf '%s\n' '        print(f"ERROR: {p} missing")' >> /tmp/validate_manifest.py
          printf '%s\n' '        sys.exit(1)' >> /tmp/validate_manifest.py
          printf '%s\n' '    print(f"OK: {p}")' >> /tmp/validate_manifest.py
          python3 /tmp/validate_manifest.py

      - name: Validate marketplace.json
        run: |
          echo "=== Validating marketplace.json ==="
          printf '%s\n' 'import json, sys' > /tmp/validate_marketplace.py
          printf '%s\n' "with open('marketplace.json') as f: m = json.load(f)" >> /tmp/validate_marketplace.py
          printf '%s\n' "required = ['name', 'version', 'description', 'skills']" >> /tmp/validate_marketplace.py
          printf '%s\n' 'for k in required:' >> /tmp/validate_marketplace.py
          printf '%s\n' '    if k not in m: print(f"Missing: {k}"); sys.exit(1)' >> /tmp/validate_marketplace.py
          printf '%s\n' 'print(f\'name: {m["name"]}\')' >> /tmp/validate_marketplace.py
          printf '%s\n' 'print(f\'version: {m["version"]}\')' >> /tmp/validate_marketplace.py
          python3 /tmp/validate_marketplace.py

      - name: Validate SKILL.md structure
        run: |
          echo "=== Validating SKILL.md ==="
          grep -q "## Prerequisites" plugin/skills/obsidian/SKILL.md || { echo "Missing Prerequisites section"; exit 1; }
          grep -q "## Syntax" plugin/skills/obsidian/SKILL.md || { echo "Missing Syntax section"; exit 1; }
          grep -q "dangerouslyDisableSandbox" plugin/skills/obsidian/SKILL.md || { echo "Missing sandbox warning"; exit 1; }
          echo "OK: SKILL.md has required sections and sandbox warning"

      - name: Validate command reference
        run: |
          echo "=== Validating command-reference.md ==="
          lines=$(wc -l < plugin/skills/obsidian/references/command-reference.md)
          if [ "$lines" -lt 50 ]; then
            echo "ERROR: command-reference.md seems too short ($lines lines)"
            exit 1
          fi
          echo "OK: $lines lines in command-reference.md"

      - name: Check for broken markdown links
        run: |
          echo "=== Checking for common issues in markdown files ==="
          grep -rn '\[.*\](\.\./' --include="*.md" . || echo "No ../ relative links found"
          echo "OK: Link check complete"

      - name: Verify no placeholder TODOs in SKILL.md
        run: |
          echo "=== Checking for unresolved TODOs in SKILL.md ==="
          if grep -qi 'TODO\|FIXME\|XXX\|TBD' plugin/skills/obsidian/SKILL.md; then
            echo "WARNING: Found TODO/FIXME/XXX/TBD in SKILL.md"
            grep -in 'TODO\|FIXME\|XXX\|TBD' plugin/skills/obsidian/SKILL.md
          else
            echo "OK: No unresolved placeholders found"
          fi

      - name: Verify sandbox warning is prominent
        run: |
          echo "=== Verifying sandbox warning prominence ==="
          sandbox_line=$(grep -n "Sandbox Mode" plugin/skills/obsidian/SKILL.md | head -1 | cut -d: -f1)
          syntax_line=$(grep -n "## Syntax" plugin/skills/obsidian/SKILL.md | head -1 | cut -d: -f1)
          if [ -z "$sandbox_line" ]; then
            echo "ERROR: No sandbox warning section found"
            exit 1
          fi
          if [ -z "$syntax_line" ]; then
            echo "ERROR: No Syntax section found"
            exit 1
          fi
          if [ "$sandbox_line" -lt "$syntax_line" ]; then
            echo "OK: Sandbox warning (line $sandbox_line) appears before Syntax (line $syntax_line)"
          else
            echo "WARNING: Sandbox warning should appear before Syntax section"
          fi

      - name: Ensure LICENSE exists
        run: |
          echo "=== Checking LICENSE ==="
          if [ ! -f LICENSE ]; then
            echo "ERROR: LICENSE file missing"
            exit 1
          fi
          echo "OK: LICENSE exists"

  bump-version:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version to commit SHA
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NEW_VERSION="2.0.0+${SHORT_SHA}"
          echo "Bumping version to $NEW_VERSION"
          printf '%s\n' 'import json, sys' > /tmp/bump_version.py
          printf '%s\n' 'v = sys.argv[1]' >> /tmp/bump_version.py
          printf '%s\n' "files = ['plugin/manifest.json', 'marketplace.json', '.claude-plugin/marketplace.json']" >> /tmp/bump_version.py
          printf '%s\n' 'for path in files:' >> /tmp/bump_version.py
          printf '%s\n' '    with open(path) as f: m = json.load(f)' >> /tmp/bump_version.py
          printf '%s\n' '    old = m.get("version", "?")' >> /tmp/bump_version.py
          printf '%s\n' '    m["version"] = v' >> /tmp/bump_version.py
          printf '%s\n' '    with open(path, "w") as f: json.dump(m, f, indent=2)' >> /tmp/bump_version.py
          printf '%s\n' '    print(f"{path}: {old} -> {v}")' >> /tmp/bump_version.py
          python3 /tmp/bump_version.py "$NEW_VERSION"

      - name: Check if version changed
        id: check
        run: |
          if git diff --quiet; then
            echo "No version change needed, skipping commit"
            echo "VERSION_CHANGED=false" >> $GITHUB_OUTPUT
          else
            echo "VERSION_CHANGED=true" >> $GITHUB_OUTPUT
            echo "Changes found:"
            git diff --stat
          fi

      - name: Commit and push version bump
        if: steps.check.outputs.VERSION_CHANGED == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add plugin/manifest.json marketplace.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ github.sha }}"
          git push
          echo "Version bumped and pushed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

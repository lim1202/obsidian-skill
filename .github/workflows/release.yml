name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.0.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Version must match format vMAJOR.MINOR.PATCH (e.g., v2.0.1)"
            exit 1
          fi

      - name: Check version doesn't already exist
        run: |
          if git tag | grep -q "^${{ inputs.version }}$"; then
            echo "ERROR: Tag ${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Update version in all manifest files
        run: |
          VERSION="${{ inputs.version }}"
          VVERSION="${VERSION#v}"
          echo "Updating version to $VVERSION"
          printf '%s\n' 'import json, sys' > /tmp/update_version.py
          printf '%s\n' 'v = sys.argv[1]' >> /tmp/update_version.py
          printf '%s\n' "files = ['plugin/manifest.json', 'marketplace.json', '.claude-plugin/marketplace.json']" >> /tmp/update_version.py
          printf '%s\n' 'for path in files:' >> /tmp/update_version.py
          printf '%s\n' '    with open(path) as f: m = json.load(f)' >> /tmp/update_version.py
          printf '%s\n' '    m["version"] = v' >> /tmp/update_version.py
          printf '%s\n' '    with open(path, "w") as f: json.dump(m, f, indent=2)' >> /tmp/update_version.py
          printf '%s\n' '    print(f"Updated {path}")' >> /tmp/update_version.py
          python3 /tmp/update_version.py "$VVERSION"

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ inputs.version }}"
          TODAY=$(date '+%Y-%m-%d')
          printf '%s\n' 'import re, sys' > /tmp/update_changelog.py
          printf '%s\n' 'version = sys.argv[1]' >> /tmp/update_changelog.py
          printf '%s\n' 'today = sys.argv[2]' >> /tmp/update_changelog.py
          printf '%s\n' "entry = '## [' + version + '] - ' + today + chr(10) + chr(10) + '### Added' + chr(10) + chr(10) + '- Release ' + version + chr(10) + chr(10)" >> /tmp/update_changelog.py
          printf '%s\n' 'with open("CHANGELOG.md") as f: lines = f.read().split(chr(10))' >> /tmp/update_changelog.py
          printf '%s\n' 'idx = 1' >> /tmp/update_changelog.py
          printf '%s\n' 'for i, line in enumerate(lines):' >> /tmp/update_changelog.py
          printf '%s\n' '    if i > 0 and line.strip() == "": idx = i; break' >> /tmp/update_changelog.py
          printf '%s\n' 'lines.insert(idx, entry)' >> /tmp/update_changelog.py
          printf '%s\n' 'with open("CHANGELOG.md", "w") as f: f.write(chr(10).join(lines))' >> /tmp/update_changelog.py
          printf '%s\n' 'print("Updated CHANGELOG.md")' >> /tmp/update_changelog.py
          python3 /tmp/update_changelog.py "$VERSION" "$TODAY"

      - name: Show diff of version files
        run: |
          git diff plugin/manifest.json marketplace.json .claude-plugin/marketplace.json CHANGELOG.md

      - name: Commit and tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add plugin/manifest.json marketplace.json .claude-plugin/marketplace.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag "${{ inputs.version }}"
          echo "Created commit and tag: ${{ inputs.version }}"

      - name: Push
        run: |
          git push origin main --tags
          echo "Pushed commit and tags to origin"

      - name: Create GitHub Release
        run: |
          VERSION="${{ inputs.version }}"
          printf '%s\n' 'import re, sys' > /tmp/create_release.py
          printf '%s\n' 'version = sys.argv[1]' >> /tmp/create_release.py
          printf '%s\n' 'with open("CHANGELOG.md") as f: content = f.read()' >> /tmp/create_release.py
          printf '%s\n' "pattern = '##\\s+\\[' + re.escape(version) + '\\]\\s+-\\s+\\d{4}-\\d{2}-\\d{2}(.*?)(?=##\\s+\\[|$)'" >> /tmp/create_release.py
          printf '%s\n' 'match = re.search(pattern, content, re.DOTALL)' >> /tmp/create_release.py
          printf '%s\n' 'body = match.group(1).strip() if match else "See CHANGELOG.md for details."' >> /tmp/create_release.py
          printf '%s\n' 'with open(".release_body", "w") as f: f.write(body)' >> /tmp/create_release.py
          printf '%s\n' 'print("Extracted release notes")' >> /tmp/create_release.py
          python3 /tmp/create_release.py "$VERSION"
          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --notes-file .release_body \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary"
          echo "- Tag: ${{ inputs.version }}"
          echo "- Commit: $(git rev-parse HEAD)"
          echo "- GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }}"

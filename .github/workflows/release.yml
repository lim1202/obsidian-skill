name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.0.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Version must match format vMAJOR.MINOR.PATCH (e.g., v2.0.1)"
            exit 1
          fi

      - name: Check version doesn't already exist
        run: |
          if git tag | grep -q "^${{ inputs.version }}$"; then
            echo "ERROR: Tag ${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Update version in manifest.json
        run: |
          VERSION="${{ inputs.version }}"
          VVERSION="${VERSION#v}"
          echo "Updating manifest.json and marketplace.json to $VVERSION"
          python3 -c "
import json

# Update plugin/manifest.json
with open('plugin/manifest.json') as f:
    m = json.load(f)
m['version'] = '$VVERSION'
with open('plugin/manifest.json', 'w') as f:
    json.dump(m, f, indent=2)
print('Updated plugin/manifest.json')

# Update marketplace.json
with open('marketplace.json') as f:
    m = json.load(f)
m['version'] = '$VVERSION'
with open('marketplace.json', 'w') as f:
    json.dump(m, f, indent=2)
print('Updated marketplace.json')
"

      - name: Update version in .claude-plugin/marketplace.json
        run: |
          VERSION="${{ inputs.version }}"
          VVERSION="${VERSION#v}"
          python3 -c "
import json
with open('.claude-plugin/marketplace.json') as f:
    m = json.load(f)
m['version'] = '$VVERSION'
with open('.claude-plugin/marketplace.json', 'w') as f:
    json.dump(m, f, indent=2)
print('Updated .claude-plugin/marketplace.json')
"

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ inputs.version }}"
          TODAY=$(date '+%Y-%m-%d')
          echo "Updating CHANGELOG.md for $VERSION"
          # Prepend new version entry to changelog
          python3 -c "
import re

with open('CHANGELOG.md') as f:
    content = f.read()

new_entry = '''## [$VERSION] - $TODAY

### Added

- Release $VERSION

'''

# Insert after the first header line (the # Changelog line)
lines = content.split('\n')
insert_idx = 1
# Find the first blank line after the header
for i, line in enumerate(lines):
    if i > 0 and line.strip() == '':
        insert_idx = i
        break

lines.insert(insert_idx, new_entry)
with open('CHANGELOG.md', 'w') as f:
    f.write('\n'.join(lines))
print('Updated CHANGELOG.md')
"

      - name: Show diff of version files
        run: |
          git diff plugin/manifest.json marketplace.json .claude-plugin/marketplace.json CHANGELOG.md

      - name: Commit and tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add plugin/manifest.json marketplace.json .claude-plugin/marketplace.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag "${{ inputs.version }}"
          echo "Created commit and tag: ${{ inputs.version }}"

      - name: Push
        run: |
          git push origin main --tags
          echo "Pushed commit and tags to origin"

      - name: Create GitHub Release
        run: |
          # Extract changelog section for this version
          VERSION="${{ inputs.version }}"
          VVERSION="${VERSION#v}"

          python3 -c "
import re
with open('CHANGELOG.md') as f:
    content = f.read()

# Extract section for this version
pattern = r'##\s+\[' + re.escape('$VERSION') + r'\]\s+-\s+\d{4}-\d{2}-\d{2}(.*?)(?=##\s+\[|$)'
match = re.search(pattern, content, re.DOTALL)
body = match.group(1).strip() if match else 'See CHANGELOG.md for details.'
with open('.release_body', 'w') as f:
    f.write(body)
print('Extracted release notes')
"

          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --notes-file .release_body \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary"
          echo "- Tag: ${{ inputs.version }}"
          echo "- Commit: $(git rev-parse HEAD)"
          echo "- GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }}"

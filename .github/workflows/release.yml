name: Release

# Manually triggered. Fill in version tag (e.g. v2.0.1) and run.
# Creates: updated version in manifest files, git commit, git tag, pushed to origin.
# After pushing, go to GitHub Releases and create release from the new tag.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: version must match vMAJOR.MINOR.PATCH (e.g. v2.0.1)"
            exit 1
          fi

      - name: Update version in all manifest files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const inputVersion = '${{ inputs.version }}';
            const newVersion = inputVersion.startsWith('v') ? inputVersion.substring(1) : inputVersion;
            const files = [
              'plugin/manifest.json',
              'marketplace.json',
              '.claude-plugin/marketplace.json'
            ];
            for (const file of files) {
              const m = JSON.parse(fs.readFileSync(file, 'utf8'));
              m.version = newVersion;
              fs.writeFileSync(file, JSON.stringify(m, null, 2) + '\n');
              console.log(`Updated ${file} to ${newVersion}`);
            }

      - name: Update CHANGELOG.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const inputVersion = '${{ inputs.version }}';
            const today = new Date().toISOString().split('T')[0];
            const entry = `## [${inputVersion}] - ${today}\n\n### Added\n\n- Release ${inputVersion}\n\n`;
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const lines = content.split('\n');
            let insertIdx = 1;
            for (let i = 1; i < lines.length; i++) {
              if (lines[i].trim() === '') { insertIdx = i; break; }
            }
            lines.splice(insertIdx, 0, entry);
            fs.writeFileSync('CHANGELOG.md', lines.join('\n'));
            console.log('Updated CHANGELOG.md');

      - name: Show diff
        run: git diff --stat

      - name: Commit and tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add plugin/manifest.json marketplace.json .claude-plugin/marketplace.json CHANGELOG.md
          git commit -m "chore: release ${{ inputs.version }}"
          git tag "${{ inputs.version }}"
          echo "Created commit and tag: ${{ inputs.version }}"

      - name: Push
        run: |
          git push origin main --tags
          echo "Pushed commit and tags."

      - name: Next steps
        run: |
          echo ""
          echo "Done! Now go to GitHub Releases to create the release:"
          echo "https://github.com/lim1202/obsidian-skill/releases/new?tag=${{ inputs.version }}"

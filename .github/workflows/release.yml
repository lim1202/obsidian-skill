name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.0.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Version must match format vMAJOR.MINOR.PATCH (e.g., v2.0.1)"
            exit 1
          fi

      - name: Check version doesn't already exist
        run: |
          if git tag | grep -q "^${{ inputs.version }}$"; then
            echo "ERROR: Tag ${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Update version in all manifest files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const inputVersion = '${{ inputs.version }}';
            const newVersion = inputVersion.startsWith('v') ? inputVersion.substring(1) : inputVersion;
            const files = [
              'plugin/manifest.json',
              'marketplace.json',
              '.claude-plugin/marketplace.json'
            ];
            for (const file of files) {
              const m = JSON.parse(fs.readFileSync(file, 'utf8'));
              m.version = newVersion;
              fs.writeFileSync(file, JSON.stringify(m, null, 2) + '\n');
              console.log(`Updated ${file} to ${newVersion}`);
            }

      - name: Update CHANGELOG.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const inputVersion = '${{ inputs.version }}';
            const today = new Date().toISOString().split('T')[0];
            const entry = `## [${inputVersion}] - ${today}\n\n### Added\n\n- Release ${inputVersion}\n\n`;
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const lines = content.split('\n');
            let insertIdx = 1;
            for (let i = 1; i < lines.length; i++) {
              if (lines[i].trim() === '') { insertIdx = i; break; }
            }
            lines.splice(insertIdx, 0, entry);
            fs.writeFileSync('CHANGELOG.md', lines.join('\n'));
            console.log('Updated CHANGELOG.md');

      - name: Show diff of version files
        run: git diff plugin/manifest.json marketplace.json .claude-plugin/marketplace.json CHANGELOG.md

      - name: Commit and tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add plugin/manifest.json marketplace.json .claude-plugin/marketplace.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag "${{ inputs.version }}"
          echo "Created commit and tag: ${{ inputs.version }}"

      - name: Push
        run: git push origin main --tags

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const inputVersion = '${{ inputs.version }}';
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const pattern = new RegExp(`##\\s+\\[${inputVersion.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\]\\s+-\\s+\\d{4}-\\d{2}-\\d{2}(.*?)(?=##\\s+\\[|$)`, 's');
            const match = content.match(pattern);
            const body = match ? match[1].trim() : 'See CHANGELOG.md for details.';
            fs.writeFileSync('.release_body', body);
            console.log('Extracted release notes');
          result-path: .release_body

      - name: Publish GitHub Release
        run: |
          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --notes-file .release_body \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary"
          echo "- Tag: ${{ inputs.version }}"
          echo "- Commit: $(git rev-parse HEAD)"
          echo "- GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }}"
